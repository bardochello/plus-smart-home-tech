spring:
  application:
    name: payment
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      fail-fast: true
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 0

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

logging:
  level:
    root: INFO
    ru.yandex.practicum: DEBUG