spring:
  application:
    name: aggregator
  config:
    import: configserver:http://localhost:8080
  cloud:
    config:
      fail-fast: true
      retry:
        use-random-policy: true
        max-interval: 6000
      discovery:
        enabled: true
        service-id: configserver

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/