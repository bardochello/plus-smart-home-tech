spring:
  application:
    name: analyzer
  config:
    import: configserver:http://localhost:8080
  cloud:
    config:
      retry:
        use-random-policy: true
        max-interval: 6000
      fail-fast: true
      discovery:
        enabled: true
        service-id: configserver
  datasource:
    url: jdbc:postgresql://localhost:5432/telemetry
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/